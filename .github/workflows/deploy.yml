name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: Docker image tag (default: sha-<current commit>)
        required: false
        type: string

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}

    steps:
      - name: Resolve image tag
        id: tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "value=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add deployment host to known hosts
        run: |
          mkdir -p ~/.ssh
          if [ -n "${{ secrets.DEPLOY_KNOWN_HOSTS }}" ]; then
            echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts
          fi

      - name: Deploy with Docker on remote host
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          IMAGE_TAG: ${{ steps.tag.outputs.value }}
          IMAGE_NAME: ghcr.io/${{ github.repository }}
          CONTAINER_NAME: smart-pc-store
          APP_PORT: ${{ vars.APP_PORT || '8080' }}
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "
            set -e
            echo '${GHCR_TOKEN}' | docker login ghcr.io -u '${GHCR_USERNAME}' --password-stdin
            docker pull ${IMAGE_NAME}:${IMAGE_TAG}
            docker stop ${CONTAINER_NAME} || true
            docker rm ${CONTAINER_NAME} || true
            docker run -d \
              --name ${CONTAINER_NAME} \
              --restart unless-stopped \
              -p ${APP_PORT}:8080 \
              ${IMAGE_NAME}:${IMAGE_TAG}
            docker image prune -f
          "
